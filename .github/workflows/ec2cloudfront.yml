name: Deploy React Build to EC2 + CloudFront

on:
  push:
    paths:
      - "build/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Configure SSH agent
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.REACT_EC2_KEY }}

    # 3️⃣ Add server to known hosts (safer than disabling checks)
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p 2222 ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

    # 4️⃣ Deploy React build using rsync
    - name: Deploy build to EC2
      run: |
        rsync -avz --delete \
        -e "ssh -p 2222" \
        build/ ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/var/www/html/

    # 5️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-2

    # 6️⃣ Invalidate CloudFront cache
    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
        --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
        --paths "/*"